[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled function: publish due social media posts every 15 minutes
[functions."publish-scheduled-posts"]
  schedule = "*/15 * * * *"

# Empêcher le CDN Netlify ET le navigateur de mettre en cache le HTML des pages.
# Sans ça, un navigateur peut charger du vieux HTML qui référence des chunks
# JS/CSS d'un ancien build (hashes différents) → 404 → écran blanc.
# CDN-Cache-Control couvre le CDN Netlify ; Cache-Control couvre le navigateur.
[[headers]]
  for = "/*"
  [headers.values]
    CDN-Cache-Control = "no-store"
    Cache-Control = "no-store, no-cache, must-revalidate"

# Les assets statiques Next.js sont content-addressed (hash dans le nom)
# → cache immutable côté CDN et navigateur
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Cache-Control = "public, max-age=31536000, immutable"

# MIME types explicites pour les CSS chunks (Netlify peut les servir en text/plain sinon)
[[headers]]
  for = "/_next/static/chunks/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    CDN-Cache-Control = "public, max-age=31536000, immutable"
    Cache-Control = "public, max-age=31536000, immutable"
